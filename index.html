<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saku Poin - SD Negeri 17 Dauh Puri</title>
    
    <!-- PWA Meta Tags (WAJIB DITAMBAHKAN) -->
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Saku Poin">
    
    <!-- Tailwind CSS (Untuk Desain) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Untuk Ikon yang langsung jalan di HTML) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Penerjemah kode agar jalan di Browser biasa) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* Konfigurasi tambahan untuk pencetakan PDF */
      @media print {
        body { background-color: white !important; }
        .print\:hidden { display: none !important; }
        .print\:block { display: block !important; }
      }
      /* Animasi Loading */
      .loader {
        border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
        width: 40px; height: 40px; animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    
    <!-- Wadah Aplikasi -->
    <div id="root"></div>

    <!-- KODE LOGIKA APLIKASI -->
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // =========================================================================
        // PENTING: Ganti URL di bawah ini dengan URL Web App Google Apps Script Anda
        // =========================================================================
        const SCRIPT_URL = "ISI_DENGAN_URL_WEB_APP_GOOGLE_SCRIPT_ANDA";

        // Konfigurasi Visual (Tetap di sini agar mudah dikelola desainnya)
        const visualData = {
          hijau: { max: 20, label: "Aman", color: "bg-green-100 text-green-800 border-green-400", icon: "fa-solid fa-circle-check" },
          kuning: { max: 50, label: "Perlu Perhatian", color: "bg-yellow-100 text-yellow-800 border-yellow-400", icon: "fa-solid fa-triangle-exclamation" },
          merah: { max: 999, label: "Perlu Tindakan", color: "bg-red-100 text-red-800 border-red-400", icon: "fa-solid fa-circle-exclamation" }
        };

        // --- KOMPONEN UTAMA ---
        function App() {
          const [activeTab, setActiveTab] = useState('input');
          const [isLoading, setIsLoading] = useState(true);
          const [isSaving, setIsSaving] = useState(false);
          const [fetchError, setFetchError] = useState(false);

          // State untuk menampung data dari Google Sheet
          const [appData, setAppData] = useState({
            schoolData: { namaSekolah: "Memuat Data...", kepalaSekolah: "", nipKepalaSekolah: "", lokasi: "" },
            teachersData: [],
            studentsData: [],
            violationsData: [],
            records: []
          });

          // State Form
          const [searchMethod, setSearchMethod] = useState('name');
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedClass, setSelectedClass] = useState('');
          const [selectedAbsen, setSelectedAbsen] = useState('');
          const [selectedStudent, setSelectedStudent] = useState(null);

          const [selectedViolation, setSelectedViolation] = useState('');
          const [selectedTeacher, setSelectedTeacher] = useState('');

          const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', title: '', message: '' });

          // Mengambil Data dari Google Sheet saat aplikasi pertama kali dibuka
          useEffect(() => {
            if (SCRIPT_URL === "ISI_DENGAN_URL_WEB_APP_GOOGLE_SCRIPT_ANDA") {
              setFetchError(true);
              setIsLoading(false);
              return;
            }

            fetch(SCRIPT_URL)
              .then(res => res.json())
              .then(data => {
                setAppData(data);
                setIsLoading(false);
              })
              .catch(err => {
                console.error("Gagal memuat data dari Google Sheet:", err);
                setFetchError(true);
                setIsLoading(false);
              });
          }, []);

          const classes = useMemo(() => [...new Set(appData.studentsData.map(s => s.kelas))].sort(), [appData.studentsData]);
          
          const filteredStudents = useMemo(() => {
            if (searchQuery.length < 2) return [];
            return appData.studentsData.filter(s => s.nama.toLowerCase().includes(searchQuery.toLowerCase()));
          }, [searchQuery, appData.studentsData]);

          const handleSelectStudent = (student) => {
            setSelectedStudent(student);
            setSearchQuery(student.nama);
          };

          useEffect(() => {
            if (searchMethod === 'class' && selectedClass && selectedAbsen) {
              const student = appData.studentsData.find(s => s.kelas === selectedClass && s.noAbsen.toString() === selectedAbsen.toString());
              setSelectedStudent(student || null);
            }
          }, [selectedClass, selectedAbsen, searchMethod, appData.studentsData]);

          // Handle Kirim Data ke Google Sheet
          const handleSave = async () => {
            if (!selectedStudent || !selectedViolation || !selectedTeacher) {
              setModalConfig({ isOpen: true, type: 'error', title: 'Data Belum Lengkap', message: 'Mohon pilih Siswa, Jenis Pelanggaran, dan Guru Pencatat terlebih dahulu.' });
              return;
            }

            setIsSaving(true);

            const violationDetail = appData.violationsData.find(v => v.id.toString() === selectedViolation.toString());
            const teacherDetail = appData.teachersData.find(t => t.id.toString() === selectedTeacher.toString());

            const newRecord = {
              id: Date.now().toString(),
              tanggal: new Date().toISOString(),
              studentId: selectedStudent.id,
              violation: violationDetail.jenis,
              poin: parseInt(violationDetail.poin),
              teacher: teacherDetail.nama
            };

            try {
              // Mengirim data ke Google Script
              const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "addRecord", data: newRecord })
              });
              
              const result = await response.json();
              
              if (result.status === 'success') {
                // Update tampilan lokal agar tidak perlu refresh web
                setAppData(prev => ({ ...prev, records: [...prev.records, newRecord] }));
                
                setModalConfig({
                  isOpen: true,
                  type: 'success',
                  title: 'Berhasil Disimpan!',
                  message: `Data pelanggaran untuk ${selectedStudent.nama} telah berhasil dicatat ke Google Sheet.`
                });
              } else {
                throw new Error("Gagal menyimpan di server");
              }
            } catch (error) {
              console.error("Error saving record:", error);
              setModalConfig({ isOpen: true, type: 'error', title: 'Gagal Menyimpan', message: 'Terjadi kesalahan saat menyimpan ke Google Sheet. Periksa koneksi internet Anda.' });
            } finally {
              setIsSaving(false);
            }
          };

          const handleCloseModal = () => {
            const isSuccess = modalConfig.type === 'success';
            setModalConfig({ ...modalConfig, isOpen: false });

            if (isSuccess) {
              setSelectedViolation('');
              setSelectedTeacher('');
              setSelectedStudent(null);
              setSearchQuery('');
              setSelectedClass('');
              setSelectedAbsen('');
            }
          };

          const studentRecords = appData.records.filter(r => r.studentId.toString() === selectedStudent?.id.toString());
          const totalPoin = studentRecords.reduce((sum, r) => sum + parseInt(r.poin || 0), 0);

          const getStatus = (poin) => {
            if (poin <= visualData.hijau.max) return visualData.hijau;
            if (poin <= visualData.kuning.max) return visualData.kuning;
            return visualData.merah;
          };

          const status = getStatus(totalPoin);

          const downloadCSV = () => {
            if (!selectedStudent) return;
            let csvContent = "Tanggal,Pelanggaran,Poin,Pencatat\n";
            studentRecords.forEach(row => {
              const date = new Date(row.tanggal).toLocaleDateString('id-ID');
              csvContent += `${date},${row.violation},${row.poin},${row.teacher}\n`;
            });
            csvContent += `\nTotal Poin,,,${totalPoin}`;

            try {
              const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.setAttribute("href", url);
              link.setAttribute("download", `Rekap_Poin_${selectedStudent.nama.replace(/\s+/g, '_')}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            } catch (error) {
              setModalConfig({ isOpen: true, type: 'error', title: 'Error Pengunduhan', message: 'Gagal mengunduh file.' });
            }
          };

          const handlePrint = () => {
            window.print();
          };

          // --- TAMPILAN LOADING ---
          if (isLoading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4 text-center">
                <div className="loader mb-6"></div>
                <h2 className="text-xl font-bold text-gray-800 mb-2">Sinkronisasi Google Sheet</h2>
                <p className="text-gray-500 text-sm">Sedang memuat data Sekolah, Guru, dan Siswa...</p>
              </div>
            );
          }

          if (fetchError) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4 text-center">
                <div className="bg-red-100 p-4 rounded-full text-red-600 mb-6">
                  <i className="fa-solid fa-link-slash text-4xl"></i>
                </div>
                <h2 className="text-xl font-bold text-gray-800 mb-2">Koneksi Database Terputus</h2>
                <p className="text-gray-500 text-sm max-w-md">
                  Harap pastikan Anda telah memasukkan <b>URL Web App Google Script</b> pada variabel <code className="bg-gray-200 px-1 rounded">SCRIPT_URL</code> di dalam file HTML aplikasi ini.
                </p>
              </div>
            );
          }

          const renderStudentSelector = () => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 relative z-10">
              <h3 className="text-sm font-semibold text-gray-700 mb-3 flex items-center">
                <i className="fa-solid fa-user text-blue-600 mr-2"></i> Pilih Siswa
              </h3>
              
              <div className="flex gap-4 mb-4">
                <label className="flex items-center text-sm cursor-pointer">
                  <input type="radio" checked={searchMethod === 'name'} onChange={() => { setSearchMethod('name'); setSelectedStudent(null); setSearchQuery(''); }} className="mr-2 text-blue-600 focus:ring-blue-500" />
                  Cari Nama
                </label>
                <label className="flex items-center text-sm cursor-pointer">
                  <input type="radio" checked={searchMethod === 'class'} onChange={() => { setSearchMethod('class'); setSelectedStudent(null); setSelectedClass(''); setSelectedAbsen(''); }} className="mr-2 text-blue-600 focus:ring-blue-500" />
                  Pilih Kelas & Absen
                </label>
              </div>

              {searchMethod === 'name' ? (
                <div className="relative">
                  <div className="flex items-center bg-gray-50 border border-gray-200 rounded-lg p-2 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                    <i className="fa-solid fa-magnifying-glass text-gray-400 mx-2"></i>
                    <input 
                      type="text" 
                      placeholder="Ketik nama siswa..." 
                      className="w-full bg-transparent border-none focus:outline-none text-gray-700 placeholder-gray-400"
                      value={searchQuery}
                      onChange={(e) => {
                        setSearchQuery(e.target.value);
                        if(selectedStudent && e.target.value !== selectedStudent.nama) setSelectedStudent(null);
                      }}
                    />
                  </div>
                  {searchQuery.length >= 2 && !selectedStudent && (
                    <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto z-20">
                      {filteredStudents.length > 0 ? (
                        filteredStudents.map(s => (
                          <div 
                            key={s.id} 
                            className="p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-50 last:border-0"
                            onClick={() => handleSelectStudent(s)}
                          >
                            <div className="font-medium text-gray-800">{s.nama}</div>
                            <div className="text-xs text-gray-500">Kelas {s.kelas} • Absen {s.noAbsen}</div>
                          </div>
                        ))
                      ) : (
                        <div className="p-3 text-sm text-gray-500 text-center">Siswa tidak ditemukan</div>
                      )}
                    </div>
                  )}
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Kelas</label>
                    <select 
                      className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      value={selectedClass}
                      onChange={(e) => { setSelectedClass(e.target.value); setSelectedAbsen(''); setSelectedStudent(null); }}
                    >
                      <option value="">Pilih Kelas</option>
                      {classes.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">No Absen</label>
                    <select 
                      className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none disabled:opacity-50"
                      value={selectedAbsen}
                      onChange={(e) => setSelectedAbsen(e.target.value)}
                      disabled={!selectedClass}
                    >
                      <option value="">Pilih Absen</option>
                      {appData.studentsData.filter(s => s.kelas === selectedClass).sort((a,b) => parseInt(a.noAbsen) - parseInt(b.noAbsen)).map(s => (
                        <option key={s.id} value={s.noAbsen}>{s.noAbsen} - {s.nama}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}

              {selectedStudent && (
                <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center justify-between">
                  <div>
                    <div className="font-semibold text-blue-900">{selectedStudent.nama}</div>
                    <div className="text-sm text-blue-700">Kelas {selectedStudent.kelas} • No. Absen {selectedStudent.noAbsen}</div>
                  </div>
                  <div className="bg-white px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm border border-blue-100">
                    Siswa Terpilih
                  </div>
                </div>
              )}
            </div>
          );

          return (
            <div className="min-h-screen bg-gray-50 text-gray-800 pb-20 md:pb-0">
              
              {/* Modal Popup */}
              {modalConfig.isOpen && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 print:hidden">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={handleCloseModal}></div>
                  <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 transform transition-all">
                    <div className="flex justify-center mb-4">
                      {modalConfig.type === 'success' ? (
                        <div className="bg-green-100 p-3 rounded-full text-green-600">
                          <i className="fa-solid fa-circle-check text-4xl"></i>
                        </div>
                      ) : (
                        <div className="bg-red-100 p-3 rounded-full text-red-600">
                          <i className="fa-solid fa-triangle-exclamation text-4xl"></i>
                        </div>
                      )}
                    </div>
                    <h3 className="text-xl font-bold text-center text-gray-900 mb-2">{modalConfig.title}</h3>
                    <p className="text-center text-gray-600 mb-6 text-sm">{modalConfig.message}</p>
                    <button 
                      onClick={handleCloseModal}
                      className={`w-full py-3 px-4 rounded-xl font-semibold text-white transition-colors ${
                        modalConfig.type === 'success' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'
                      }`}
                    >
                      Oke, Mengerti
                    </button>
                  </div>
                </div>
              )}

              {/* Header */}
              <header className="bg-white shadow-sm sticky top-0 z-50 print:hidden">
                <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="bg-blue-600 w-10 h-10 flex items-center justify-center rounded-lg shadow-inner">
                      <i className="fa-solid fa-shield-halved text-xl text-white"></i>
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-gray-900 leading-tight">Saku Poin</h1>
                      <p className="text-xs text-gray-500 font-medium">{appData.schoolData.namaSekolah}</p>
                    </div>
                  </div>
                  
                  {/* Desktop Menu */}
                  <nav className="hidden md:flex bg-gray-100 p-1 rounded-lg">
                    <button onClick={() => setActiveTab('input')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'input' ? 'bg-white shadow text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>Input</button>
                    <button onClick={() => setActiveTab('rekap')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'rekap' ? 'bg-white shadow text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>Rekapan</button>
                    <button onClick={() => setActiveTab('download')} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'download' ? 'bg-white shadow text-blue-600' : 'text-gray-600 hover:text-gray-900'}`}>Download</button>
                  </nav>
                </div>
              </header>

              <main className="max-w-3xl mx-auto px-4 py-6 print:p-0 print:max-w-none">
                
                {/* TAB 1: INPUT */}
                <div className={`space-y-6 print:hidden ${activeTab === 'input' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}

                  <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <h3 className="text-sm font-semibold text-gray-700 mb-4 flex items-center">
                      <i className="fa-solid fa-circle-exclamation text-red-500 mr-2"></i> Detail Pelanggaran
                    </h3>
                    
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Jenis Pelanggaran</label>
                        <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none" value={selectedViolation} onChange={(e) => setSelectedViolation(e.target.value)}>
                          <option value="">-- Pilih Pelanggaran --</option>
                          {appData.violationsData.map(v => <option key={v.id} value={v.id}>{v.jenis} (Poin: {v.poin})</option>)}
                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Guru Pencatat</label>
                        <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:outline-none" value={selectedTeacher} onChange={(e) => setSelectedTeacher(e.target.value)}>
                          <option value="">-- Pilih Guru --</option>
                          {appData.teachersData.map(t => <option key={t.id} value={t.id}>{t.nama}</option>)}
                        </select>
                      </div>

                      <button 
                        onClick={handleSave} 
                        disabled={isSaving}
                        className={`w-full text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center transition-colors shadow-sm mt-6 ${isSaving ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                      >
                        {isSaving ? (
                          <><div className="loader !w-5 !h-5 !border-2 !border-white !border-t-transparent mr-2"></div> Menyimpan...</>
                        ) : (
                          <><i className="fa-solid fa-floppy-disk mr-2"></i> Simpan Pelanggaran</>
                        )}
                      </button>
                    </div>
                  </div>
                </div>

                {/* TAB 2: REKAP */}
                <div className={`space-y-6 print:hidden ${activeTab === 'rekap' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}

                  {selectedStudent ? (
                    <div className="space-y-6">
                      <div className={`p-6 rounded-2xl border ${status.color} flex flex-col items-center justify-center text-center shadow-sm relative overflow-hidden`}>
                        <div className="absolute top-0 right-0 p-4 opacity-20">
                           <i className={`${status.icon} text-[6rem]`}></i>
                        </div>
                        <h2 className="text-5xl font-black mb-2 relative z-10">{totalPoin}</h2>
                        <p className="text-sm uppercase tracking-wider font-bold opacity-80 mb-1 relative z-10">Total Poin</p>
                        <div className="inline-flex items-center bg-white/40 backdrop-blur-sm px-3 py-1 rounded-full mt-2 relative z-10">
                          <i className={`${status.icon} mr-2`}></i>
                          <span className="font-semibold text-sm">{status.label}</span>
                        </div>
                      </div>

                      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                          <h3 className="font-semibold text-gray-800 flex items-center">
                            <i className="fa-solid fa-clock-rotate-left text-gray-500 mr-2"></i> Riwayat Pelanggaran
                          </h3>
                          <span className="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-md font-medium">{studentRecords.length} Catatan</span>
                        </div>
                        
                        <div className="divide-y divide-gray-100 max-h-[400px] overflow-y-auto">
                          {studentRecords.length > 0 ? (
                            studentRecords.map(record => (
                              <div key={record.id} className="p-4 hover:bg-gray-50 transition-colors">
                                <div className="flex justify-between items-start mb-1">
                                  <p className="font-medium text-gray-800">{record.violation}</p>
                                  <span className="text-red-600 font-bold bg-red-50 px-2 py-0.5 rounded text-sm">+{record.poin}</span>
                                </div>
                                <div className="flex justify-between items-center text-xs text-gray-500">
                                  <span>{new Date(record.tanggal).toLocaleDateString('id-ID')}</span>
                                  <span>Oleh: {record.teacher}</span>
                                </div>
                              </div>
                            ))
                          ) : (
                            <div className="p-8 text-center text-gray-400">
                              <i className="fa-solid fa-circle-check text-5xl mx-auto mb-3 text-gray-200 block"></i>
                              <p>Belum ada catatan pelanggaran.</p>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="text-center p-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400">
                      <i className="fa-solid fa-magnifying-glass text-4xl mb-3 opacity-50 block"></i>
                      <p>Pilih siswa terlebih dahulu.</p>
                    </div>
                  )}
                </div>

                {/* TAB 3: DOWNLOAD */}
                <div className={`space-y-6 print:hidden ${activeTab === 'download' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}

                  {selectedStudent && (
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                      <h3 className="font-semibold text-gray-800 mb-4 border-b pb-2">Opsi Unduh Laporan</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onClick={handlePrint} className="flex flex-col items-center justify-center p-6 bg-red-50 hover:bg-red-100 border border-red-200 rounded-xl transition-all">
                          <div className="bg-white w-14 h-14 flex items-center justify-center rounded-full shadow-sm mb-3">
                            <i className="fa-solid fa-print text-3xl text-red-600"></i>
                          </div>
                          <span className="font-semibold text-red-900">Cetak / Simpan PDF</span>
                          <span className="text-xs text-red-600 mt-1 text-center">Format resmi dengan kop surat</span>
                        </button>

                        <button onClick={downloadCSV} className="flex flex-col items-center justify-center p-6 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-xl transition-all">
                          <div className="bg-white w-14 h-14 flex items-center justify-center rounded-full shadow-sm mb-3">
                            <i className="fa-solid fa-file-excel text-3xl text-emerald-600"></i>
                          </div>
                          <span className="font-semibold text-emerald-900">Unduh Excel (CSV)</span>
                          <span className="text-xs text-emerald-600 mt-1 text-center">Format tabel sederhana</span>
                        </button>
                      </div>
                    </div>
                  )}
                </div>

              </main>

              {/* TAMPILAN PRINT (Hanya Muncul Saat di Print) */}
              {selectedStudent && (
                <div className="hidden print:block text-black bg-white p-8">
                  <div className="text-center border-b-2 border-black pb-4 mb-6">
                    <h1 className="text-xl font-bold uppercase">Rekapan Saku Poin Siswa</h1>
                    <h2 className="text-2xl font-bold uppercase">{appData.schoolData.namaSekolah}</h2>
                    <p className="text-sm mt-1">Laporan Resmi Poin Pelanggaran Kedisiplinan Siswa</p>
                  </div>

                  <table className="mb-6 text-sm">
                    <tbody>
                      <tr><td className="w-32 py-1 font-semibold">Nama Siswa</td><td className="w-4">:</td><td>{selectedStudent.nama}</td></tr>
                      <tr><td className="py-1 font-semibold">Kelas</td><td>:</td><td>{selectedStudent.kelas}</td></tr>
                      <tr><td className="py-1 font-semibold">No. Absen</td><td>:</td><td>{selectedStudent.noAbsen}</td></tr>
                      <tr><td className="py-1 font-semibold">Total Poin</td><td>:</td><td className="font-bold text-lg">{totalPoin} ({status.label})</td></tr>
                    </tbody>
                  </table>

                  <table className="w-full text-sm border-collapse border border-gray-800 mb-8">
                    <thead>
                      <tr className="bg-gray-100">
                        <th className="border border-gray-800 p-2 text-center w-12">No</th>
                        <th className="border border-gray-800 p-2 text-left">Tanggal</th>
                        <th className="border border-gray-800 p-2 text-left">Jenis Pelanggaran</th>
                        <th className="border border-gray-800 p-2 text-center w-20">Poin</th>
                        <th className="border border-gray-800 p-2 text-left">Pencatat</th>
                      </tr>
                    </thead>
                    <tbody>
                      {studentRecords.length > 0 ? (
                        studentRecords.map((r, index) => (
                          <tr key={r.id}>
                            <td className="border border-gray-800 p-2 text-center">{index + 1}</td>
                            <td className="border border-gray-800 p-2">{new Date(r.tanggal).toLocaleDateString('id-ID')}</td>
                            <td className="border border-gray-800 p-2">{r.violation}</td>
                            <td className="border border-gray-800 p-2 text-center">{r.poin}</td>
                            <td className="border border-gray-800 p-2">{r.teacher}</td>
                          </tr>
                        ))
                      ) : (
                        <tr><td colSpan="5" className="border border-gray-800 p-4 text-center italic">Tidak ada catatan pelanggaran.</td></tr>
                      )}
                    </tbody>
                  </table>

                  <div className="flex justify-between mt-12 text-sm pt-8">
                    <div className="text-center w-64">
                      <p className="mb-20">Mengetahui,<br/>Kepala Sekolah</p>
                      <p className="font-bold underline">{appData.schoolData.kepalaSekolah}</p>
                      <p>NIP. {appData.schoolData.nipKepalaSekolah}</p>
                    </div>
                    <div className="text-center w-64">
                      <p>{appData.schoolData.lokasi}, {new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                      <p className="mb-16">Wali Kelas {selectedStudent.kelas}</p>
                      {(() => {
                        const waliKelas = appData.teachersData.find(t => t.waliKelas === selectedStudent.kelas);
                        return waliKelas ? (
                          <>
                            <p className="font-bold underline">{waliKelas.nama}</p>
                            <p>NIP. {waliKelas.nip || '-'}</p>
                          </>
                        ) : (<p className="italic text-gray-500">(Belum ditentukan)</p>);
                      })()}
                    </div>
                  </div>
                </div>
              )}

              {/* Mobile Menu */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 print:hidden">
                <div className="flex justify-around items-center h-16">
                  <button onClick={() => setActiveTab('input')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'input' ? 'text-blue-600' : 'text-gray-400'}`}>
                    <i className="fa-solid fa-floppy-disk text-xl"></i>
                    <span className="text-[10px] font-medium">Input</span>
                  </button>
                  <button onClick={() => setActiveTab('rekap')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'rekap' ? 'text-blue-600' : 'text-gray-400'}`}>
                    <i className="fa-solid fa-file-lines text-xl"></i>
                    <span className="text-[10px] font-medium">Rekapan</span>
                  </button>
                  <button onClick={() => setActiveTab('download')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'download' ? 'text-blue-600' : 'text-gray-400'}`}>
                    <i className="fa-solid fa-download text-xl"></i>
                    <span className="text-[10px] font-medium">Download</span>
                  </button>
                </div>
              </nav>

            </div>
          );
        }

        // Render Aplikasi ke Browser
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Registrasi Service Worker untuk PWA (WAJIB DITAMBAHKAN SEBELUM BODY TERTUTUP) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker berhasil didaftarkan'))
            .catch(err => console.log('Service Worker gagal didaftarkan:', err));
        });
      }
    </script>
</body>
</html>
