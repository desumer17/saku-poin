<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saku Poin - SD Negeri 17 Dauh Puri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @media print {
        body { background-color: white !important; }
        .print\:hidden { display: none !important; }
        .print\:block { display: block !important; }
        @page { margin: 1.5cm; }
      }
      /* Animasi Loading Spinner */
      .loader {
        border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6;
        border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // =========================================================================
        // MASUKKAN URL GOOGLE APPS SCRIPT BARU ANDA DI SINI
        // =========================================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTx-lDTKf0wZnVPmk3VdEteL32LmhyDtuxxRr8rnEWAHYFY8DSm9NOnxLCHRV3frgK/exec"; 

        const visualData = {
          hijau: { max: 20, label: "Aman", color: "bg-green-100 text-green-800 border-green-400", icon: "fa-solid fa-circle-check" },
          kuning: { max: 50, label: "Perlu Perhatian", color: "bg-yellow-100 text-yellow-800 border-yellow-400", icon: "fa-solid fa-triangle-exclamation" },
          merah: { max: 999, label: "Perlu Tindakan", color: "bg-red-100 text-red-800 border-red-400", icon: "fa-solid fa-circle-exclamation" }
        };

        function App() {
          // --- STATE LOADING & DATA GOOGLE SHEETS ---
          const [isLoading, setIsLoading] = useState(true);
          const [masterData, setMasterData] = useState({
            school: { namaSekolah: "Memuat...", kepalaSekolah: "", nipKepalaSekolah: "", lokasi: "" },
            teachers: [], students: [], violations: []
          });

          const [activeTab, setActiveTab] = useState('input');
          const [records, setRecords] = useState([]); 
          const [actionRecords, setActionRecords] = useState([]); 

          // State Form Pencarian
          const [searchMethod, setSearchMethod] = useState('name');
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedClass, setSelectedClass] = useState('');
          const [selectedAbsen, setSelectedAbsen] = useState('');
          const [selectedStudent, setSelectedStudent] = useState(null);

          // State Form Input
          const [selectedViolation, setSelectedViolation] = useState('');
          const [selectedTeacher, setSelectedTeacher] = useState('');
          const [rincianTindakan, setRincianTindakan] = useState('');
          const [isDidampingi, setIsDidampingi] = useState('tidak');
          const [namaOrtu, setNamaOrtu] = useState('');
          const [keteranganTindakan, setKeteranganTindakan] = useState('Selesai');
          const [fotoBase64, setFotoBase64] = useState([]);
          const [printLayout, setPrintLayout] = useState('rekap');
          const [modalConfig, setModalConfig] = useState({ isOpen: false, type: '', title: '', message: '' });

          // --- FETCH DATA SAAT APLIKASI DIBUKA ---
          useEffect(() => {
            if (!GOOGLE_SCRIPT_URL) {
              setIsLoading(false);
              showModal('error', 'URL Belum Diatur', 'Silakan masukkan URL Google Script di dalam kode index.html.');
              return;
            }

            fetch(GOOGLE_SCRIPT_URL)
              .then(res => res.json())
              .then(data => {
                if (data.error) throw new Error(data.error);
                
                setMasterData({
                  school: data.schoolData || {},
                  teachers: data.teachersData || [],
                  students: data.studentsData || [],
                  violations: data.violationsData || []
                });
                setRecords(data.records || []);
                setActionRecords(data.actionRecords || []);
                setIsLoading(false);
              })
              .catch(err => {
                console.error("Gagal memuat data:", err);
                setIsLoading(false);
                showModal('error', 'Gagal Memuat Data', 'Pastikan URL Script benar dan Anda memiliki koneksi internet.');
              });
          }, []);

          // --- HELPERS (Berdasarkan Data Google Sheets) ---
          // PERBAIKAN: Memaksa nilai kelas menjadi String (Teks) agar sesuai dengan Dropdown HTML
          const classes = useMemo(() => [...new Set(masterData.students.map(s => String(s.kelas)))].sort(), [masterData.students]);
          
          const filteredStudents = useMemo(() => {
            if (searchQuery.length < 2) return [];
            return masterData.students.filter(s => s.nama.toLowerCase().includes(searchQuery.toLowerCase()));
          }, [searchQuery, masterData.students]);

          const handleSelectStudent = (student) => {
            setSelectedStudent(student);
            setSearchQuery(student.nama);
          };

          useEffect(() => {
            if (searchMethod === 'class' && selectedClass && selectedAbsen) {
              // PERBAIKAN: Menyamakan tipe data menjadi String saat membandingkan data Google Sheets dengan dropdown HTML
              const student = masterData.students.find(s => String(s.kelas) === String(selectedClass) && String(s.noAbsen) === String(selectedAbsen));
              setSelectedStudent(student || null);
            }
          }, [selectedClass, selectedAbsen, searchMethod, masterData.students]);

          const sendToGoogleSheets = async (payload) => {
            if (GOOGLE_SCRIPT_URL) {
              try {
                fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
                  .catch(e => console.error("CORS warning (normal):", e));
              } catch (error) { console.error("Error sending:", error); }
            }
          };

          // --- HANDLE SIMPAN PELANGGARAN ---
          const handleSavePelanggaran = () => {
            if (!selectedStudent || !selectedViolation || !selectedTeacher) {
              showModal('error', 'Data Belum Lengkap', 'Pilih Siswa, Pelanggaran, dan Guru.');
              return;
            }
            const violationDetail = masterData.violations.find(v => String(v.id) === String(selectedViolation));
            const teacherDetail = masterData.teachers.find(t => String(t.id) === String(selectedTeacher));
            const newRecord = {
              id: Date.now().toString(), tanggal: new Date().toISOString(), studentId: selectedStudent.id,
              violation: violationDetail.jenis, poin: parseInt(violationDetail.poin), teacher: teacherDetail.nama, status: 'Aktif'
            };
            setRecords([newRecord, ...records]);
            sendToGoogleSheets({ action: 'simpan_pelanggaran', ...newRecord });
            showModal('success', 'Tersimpan!', `Pelanggaran ${selectedStudent.nama} dicatat.`);
            resetForms();
          };

          // --- HANDLE UPLOAD FOTO ---
          const handleImageUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length + fotoBase64.length > 2) {
              showModal('error', 'Batas Foto', 'Maksimal hanya 2 foto.'); return;
            }
            files.forEach(file => {
              const reader = new FileReader();
              reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                  const canvas = document.createElement('canvas');
                  const MAX_WIDTH = 800; let scaleSize = 1;
                  if (img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                  canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                  const ctx = canvas.getContext('2d');
                  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                  const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                  setFotoBase64(prev => [...prev, compressedBase64]);
                }
                img.src = event.target.result;
              };
              reader.readAsDataURL(file);
            });
          };

          const removeFoto = (index) => setFotoBase64(prev => prev.filter((_, i) => i !== index));

          // --- HANDLE SIMPAN TINDAKAN ---
          const handleSaveTindakan = () => {
            if (!selectedStudent || !rincianTindakan) {
              showModal('error', 'Data Belum Lengkap', 'Rincian tindakan harus diisi.'); return;
            }
            if (isDidampingi === 'ya' && !namaOrtu) {
              showModal('error', 'Data Belum Lengkap', 'Nama Orang Tua/Wali harus diisi.'); return;
            }
            const newAction = {
              id: Date.now().toString(), tanggal: new Date().toISOString(), studentId: selectedStudent.id,
              rincian: rincianTindakan, didampingi: isDidampingi, namaOrtu: isDidampingi === 'ya' ? namaOrtu : '-',
              keterangan: keteranganTindakan, foto: fotoBase64
            };
            setActionRecords([newAction, ...actionRecords]);
            setRecords(prev => prev.map(rec => (String(rec.studentId) === String(selectedStudent.id) && rec.status === 'Aktif') ? { ...rec, status: 'Ditindak' } : rec));
            sendToGoogleSheets({ action: 'simpan_tindakan', ...newAction });
            showModal('success', 'Tindakan Disimpan!', `Tindakan dicatat. Poin pelanggaran direset.`);
            resetForms();
          };

          const showModal = (type, title, message) => setModalConfig({ isOpen: true, type, title, message });
          const handleCloseModal = () => setModalConfig({ ...modalConfig, isOpen: false });
          const resetForms = () => {
            setSelectedViolation(''); setSelectedTeacher(''); setRincianTindakan(''); setIsDidampingi('tidak');
            setNamaOrtu(''); setKeteranganTindakan('Selesai'); setFotoBase64([]); setSelectedStudent(null);
            setSearchQuery(''); setSelectedClass(''); setSelectedAbsen('');
          };

          // --- KALKULASI REKAPAN ---
          const studentRecords = records.filter(r => String(r.studentId) === String(selectedStudent?.id));
          const studentActions = actionRecords.filter(a => String(a.studentId) === String(selectedStudent?.id));
          const activeRecords = studentRecords.filter(r => r.status === 'Aktif');
          const totalPoinAktif = activeRecords.reduce((sum, r) => sum + parseInt(r.poin || 0), 0);
          const statusInfo = totalPoinAktif <= visualData.hijau.max ? visualData.hijau 
                           : totalPoinAktif <= visualData.kuning.max ? visualData.kuning : visualData.merah;

          const handlePrint = (type) => { setPrintLayout(type); setTimeout(() => window.print(), 200); };

          const downloadCSV = () => {
            if (!selectedStudent) return;
            let csvContent = "Tanggal,Pelanggaran,Poin,Status,Pencatat\n";
            studentRecords.forEach(row => {
              const date = new Date(row.tanggal).toLocaleDateString('id-ID');
              csvContent += `${date},${row.violation},${row.poin},${row.status},${row.teacher}\n`;
            });
            csvContent += `\nTotal Poin Aktif,,,${totalPoinAktif}`;
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.setAttribute("href", url);
            link.setAttribute("download", `Rekap_Poin_${selectedStudent.nama.replace(/\s+/g, '_')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };

          // --- TAMPILAN LOADING SCREEN ---
          if (isLoading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
                <div className="loader mb-4"></div>
                <h2 className="text-xl font-bold text-gray-700">Memuat Data Sekolah...</h2>
                <p className="text-sm text-gray-500">Menyinkronkan dengan Google Sheets</p>
              </div>
            );
          }

          const renderStudentSelector = () => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 relative z-10">
              <h3 className="text-sm font-semibold text-gray-700 mb-3 flex items-center"><i className="fa-solid fa-user text-blue-600 mr-2"></i> Pilih Siswa</h3>
              <div className="flex gap-4 mb-4">
                <label className="flex items-center text-sm cursor-pointer">
                  <input type="radio" checked={searchMethod === 'name'} onChange={() => { setSearchMethod('name'); setSelectedStudent(null); setSearchQuery(''); }} className="mr-2 text-blue-600 focus:ring-blue-500" /> Cari Nama
                </label>
                <label className="flex items-center text-sm cursor-pointer">
                  <input type="radio" checked={searchMethod === 'class'} onChange={() => { setSearchMethod('class'); setSelectedStudent(null); setSelectedClass(''); setSelectedAbsen(''); }} className="mr-2 text-blue-600 focus:ring-blue-500" /> Pilih Kelas & Absen
                </label>
              </div>

              {searchMethod === 'name' ? (
                <div className="relative">
                  <div className="flex items-center bg-gray-50 border border-gray-200 rounded-lg p-2 focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                    <i className="fa-solid fa-magnifying-glass text-gray-400 mx-2"></i>
                    <input type="text" placeholder="Ketik nama siswa..." className="w-full bg-transparent border-none focus:outline-none text-gray-700" value={searchQuery} onChange={(e) => { setSearchQuery(e.target.value); if(selectedStudent && e.target.value !== selectedStudent.nama) setSelectedStudent(null); }} />
                  </div>
                  {searchQuery.length >= 2 && !selectedStudent && (
                    <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto z-20">
                      {filteredStudents.length > 0 ? (
                        filteredStudents.map(s => (
                          <div key={s.id} className="p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-50" onClick={() => handleSelectStudent(s)}>
                            <div className="font-medium text-gray-800">{s.nama}</div><div className="text-xs text-gray-500">Kelas {s.kelas} • Absen {s.noAbsen}</div>
                          </div>
                        ))
                      ) : (<div className="p-3 text-sm text-gray-500 text-center">Siswa tidak ditemukan</div>)}
                    </div>
                  )}
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-700 focus:ring-2 focus:ring-blue-500" value={selectedClass} onChange={(e) => { setSelectedClass(e.target.value); setSelectedAbsen(''); setSelectedStudent(null); }}>
                      <option value="">Pilih Kelas</option>
                      {classes.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    {/* PERBAIKAN: Memastikan pemfilteran data menggunakan String() agar format datanya sama */}
                    <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-700 focus:ring-2 focus:ring-blue-500 disabled:opacity-50" value={selectedAbsen} onChange={(e) => setSelectedAbsen(e.target.value)} disabled={!selectedClass}>
                      <option value="">Pilih Absen</option>
                      {masterData.students.filter(s => String(s.kelas) === String(selectedClass)).sort((a,b) => parseInt(a.noAbsen) - parseInt(b.noAbsen)).map(s => (
                        <option key={s.id} value={s.noAbsen}>{s.noAbsen} - {s.nama}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}
              {selectedStudent && (
                <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center justify-between">
                  <div>
                    <div className="font-semibold text-blue-900">{selectedStudent.nama}</div>
                    <div className="text-sm text-blue-700">Kelas {selectedStudent.kelas} • No. Absen {selectedStudent.noAbsen}</div>
                  </div>
                  <div className="bg-white px-3 py-1 rounded-full text-xs font-bold text-blue-600 shadow-sm border border-blue-100">Siswa Terpilih</div>
                </div>
              )}
            </div>
          );

          return (
            <div className="min-h-screen bg-gray-50 text-gray-800 pb-20 md:pb-0">
              {/* Modal Popup */}
              {modalConfig.isOpen && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 print:hidden">
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={handleCloseModal}></div>
                  <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 transform transition-all">
                    <div className="flex justify-center mb-4">
                      {modalConfig.type === 'success' ? (<div className="bg-green-100 p-3 rounded-full text-green-600"><i className="fa-solid fa-circle-check text-4xl"></i></div>) 
                      : (<div className="bg-red-100 p-3 rounded-full text-red-600"><i className="fa-solid fa-triangle-exclamation text-4xl"></i></div>)}
                    </div>
                    <h3 className="text-xl font-bold text-center text-gray-900 mb-2">{modalConfig.title}</h3>
                    <p className="text-center text-gray-600 mb-6 text-sm">{modalConfig.message}</p>
                    <button onClick={handleCloseModal} className={`w-full py-3 px-4 rounded-xl font-semibold text-white ${modalConfig.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`}>Oke</button>
                  </div>
                </div>
              )}

              {/* Header */}
              <header className="bg-white shadow-sm sticky top-0 z-50 print:hidden">
                <div className="max-w-3xl mx-auto px-4 py-3 flex flex-col md:flex-row md:items-center justify-between gap-3">
                  <div className="flex items-center gap-3">
                    <div className="bg-blue-600 w-10 h-10 flex items-center justify-center rounded-lg shadow-inner"><i className="fa-solid fa-shield-halved text-xl text-white"></i></div>
                    <div>
                      <h1 className="text-xl font-bold text-gray-900 leading-tight">Saku Poin</h1>
                      <p className="text-xs text-gray-500 font-medium">{masterData.school.namaSekolah}</p>
                    </div>
                  </div>
                  <nav className="hidden md:flex bg-gray-100 p-1 rounded-lg">
                    <button onClick={() => setActiveTab('input')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${activeTab === 'input' ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>Poin</button>
                    <button onClick={() => setActiveTab('tindakan')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${activeTab === 'tindakan' ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>Tindakan</button>
                    <button onClick={() => setActiveTab('rekap')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${activeTab === 'rekap' ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>Rekapan</button>
                    <button onClick={() => setActiveTab('download')} className={`px-3 py-1.5 rounded-md text-sm font-medium ${activeTab === 'download' ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>Cetak</button>
                  </nav>
                </div>
              </header>

              <main className="max-w-3xl mx-auto px-4 py-6 print:p-0 print:max-w-none">
                {/* TAB 1: INPUT POIN */}
                <div className={`space-y-6 print:hidden ${activeTab === 'input' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}
                  <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <h3 className="text-sm font-semibold text-gray-700 mb-4 flex items-center"><i className="fa-solid fa-circle-exclamation text-red-500 mr-2"></i> Catat Pelanggaran</h3>
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Jenis Pelanggaran</label>
                        <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-gray-700" value={selectedViolation} onChange={(e) => setSelectedViolation(e.target.value)}>
                          <option value="">-- Pilih Pelanggaran --</option>
                          {masterData.violations.map(v => <option key={v.id} value={v.id}>{v.jenis} (Poin: {v.poin})</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Guru Pencatat</label>
                        <select className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-gray-700" value={selectedTeacher} onChange={(e) => setSelectedTeacher(e.target.value)}>
                          <option value="">-- Pilih Guru --</option>
                          {masterData.teachers.map(t => <option key={t.id} value={t.id}>{t.nama}</option>)}
                        </select>
                      </div>
                      <button onClick={handleSavePelanggaran} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg flex items-center justify-center mt-6"><i className="fa-solid fa-floppy-disk mr-2"></i> Simpan Poin</button>
                    </div>
                  </div>
                </div>

                {/* TAB 2: TINDAKAN */}
                <div className={`space-y-6 print:hidden ${activeTab === 'tindakan' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}
                  {selectedStudent ? (
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                      <h3 className="text-sm font-semibold text-gray-700 mb-4 flex items-center"><i className="fa-solid fa-gavel text-indigo-500 mr-2"></i> Input Tindakan</h3>
                      <div className="bg-indigo-50 p-3 rounded-lg mb-4 flex justify-between items-center"><span className="text-sm text-indigo-800">Poin Aktif:</span><span className="font-bold text-lg text-indigo-900">{totalPoinAktif}</span></div>
                      <div className="space-y-4">
                        <textarea rows="3" placeholder="Rincian Tindakan..." className="w-full bg-gray-50 border border-gray-200 rounded-lg p-3" value={rincianTindakan} onChange={(e) => setRincianTindakan(e.target.value)}></textarea>
                        <div className="border border-gray-100 p-3 rounded-lg bg-gray-50">
                          <label className="block text-sm mb-2">Didampingi Ortu?</label>
                          <div className="flex gap-4 mb-3">
                            <label><input type="radio" checked={isDidampingi === 'ya'} onChange={() => setIsDidampingi('ya')} className="mr-2"/> Ya</label>
                            <label><input type="radio" checked={isDidampingi === 'tidak'} onChange={() => { setIsDidampingi('tidak'); setNamaOrtu(''); }} className="mr-2"/> Tidak</label>
                          </div>
                          {isDidampingi === 'ya' && <input type="text" placeholder="Nama Ortu..." className="w-full border rounded-lg p-2.5" value={namaOrtu} onChange={(e) => setNamaOrtu(e.target.value)} />}
                        </div>
                        <select className="w-full bg-gray-50 border rounded-lg p-3" value={keteranganTindakan} onChange={(e) => setKeteranganTindakan(e.target.value)}>
                          <option value="Selesai">Selesai (Reset Poin)</option>
                          <option value="Dalam Pengawasan">Dalam Pengawasan</option>
                        </select>
                        <div>
                          <label className="flex items-center px-4 py-2 bg-white border rounded-lg cursor-pointer max-w-max text-sm"><i className="fa-solid fa-camera text-gray-500 mr-2"></i> Tambah Foto<input type="file" accept="image/*" multiple className="hidden" onChange={handleImageUpload} disabled={fotoBase64.length >= 2} /></label>
                          {fotoBase64.length > 0 && (
                            <div className="flex gap-3 mt-3">
                              {fotoBase64.map((src, idx) => (
                                <div key={idx} className="relative w-24 h-24 border rounded-lg overflow-hidden group"><img src={src} className="w-full h-full object-cover" /><button onClick={() => removeFoto(idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 flex justify-center items-center"><i className="fa-solid fa-xmark text-xs"></i></button></div>
                              ))}
                            </div>
                          )}
                        </div>
                        <button onClick={handleSaveTindakan} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg mt-6"><i className="fa-solid fa-gavel mr-2"></i> Simpan & Reset Poin</button>
                      </div>
                    </div>
                  ) : (<div className="text-center p-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400"><p>Pilih siswa untuk tindakan.</p></div>)}
                </div>

                {/* TAB 3: REKAPAN */}
                <div className={`space-y-6 print:hidden ${activeTab === 'rekap' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}
                  {selectedStudent && (
                    <div className="space-y-6">
                      <div className={`p-6 rounded-2xl border ${statusInfo.color} flex flex-col items-center justify-center text-center shadow-sm relative overflow-hidden`}>
                        <h2 className="text-5xl font-black mb-2 relative z-10">{totalPoinAktif}</h2>
                        <p className="text-sm uppercase tracking-wider font-bold opacity-80 mb-1">Poin Aktif</p>
                        <div className="inline-flex items-center bg-white/50 backdrop-blur-sm px-3 py-1 rounded-full mt-2"><i className={`${statusInfo.icon} mr-2`}></i><span className="font-semibold text-sm">{statusInfo.label}</span></div>
                      </div>

                      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 bg-gray-50"><h3 className="font-semibold text-gray-800"><i className="fa-solid fa-book-open text-gray-500 mr-2"></i> Buku Catatan Siswa</h3></div>
                        <div className="divide-y divide-gray-100 max-h-[500px] overflow-y-auto">
                          {studentRecords.length === 0 && studentActions.length === 0 ? (<div className="p-8 text-center text-gray-400">Belum ada catatan.</div>) : (
                            <>
                              {studentActions.map(action => (
                                <div key={action.id} className="p-4 bg-indigo-50/50 border-l-4 border-indigo-500">
                                  <div className="flex justify-between items-start mb-1"><p className="font-semibold text-indigo-900">Tindakan</p><span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md font-bold">{action.keterangan}</span></div>
                                  <p className="text-sm text-gray-700 mt-1 mb-2">"{action.rincian}"</p>
                                  <div className="flex text-xs text-gray-500 space-x-4"><span>📅 {new Date(action.tanggal).toLocaleDateString('id-ID')}</span>{action.didampingi === 'ya' && <span>👥 {action.namaOrtu}</span>}{action.foto.length > 0 && <span>📸 {action.foto.length} Foto</span>}</div>
                                </div>
                              ))}
                              {studentRecords.map(record => {
                                const isResolved = record.status === 'Ditindak';
                                return (
                                  <div key={record.id} className={`p-4 ${isResolved ? 'bg-gray-50 opacity-60' : 'hover:bg-gray-50'}`}>
                                    <div className="flex justify-between items-start mb-1"><p className={`font-medium ${isResolved ? 'line-through text-gray-500' : 'text-gray-800'}`}>{record.violation}</p>
                                      {isResolved ? (<span className="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded"><i className="fa-solid fa-square-check mr-1"></i> Selesai</span>) : (<span className="text-red-600 font-bold bg-red-50 px-2 py-0.5 rounded text-sm">+{record.poin}</span>)}
                                    </div>
                                    <div className="flex justify-between text-xs text-gray-500"><span>{new Date(record.tanggal).toLocaleDateString('id-ID')}</span><span>{record.teacher}</span></div>
                                  </div>
                                );
                              })}
                            </>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {/* TAB 4: CETAK */}
                <div className={`space-y-6 print:hidden ${activeTab === 'download' ? 'block' : 'hidden'}`}>
                  {renderStudentSelector()}
                  {selectedStudent && (
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onClick={() => handlePrint('rekap')} className="flex items-center p-4 bg-blue-50 border border-blue-200 rounded-xl text-left"><div className="bg-white w-12 h-12 flex items-center justify-center rounded-full mr-4"><i className="fa-solid fa-file-lines text-xl text-blue-600"></i></div><div><span className="block font-semibold text-blue-900">1. Cetak Rekap Poin</span></div></button>
                        <button onClick={() => handlePrint('tindakan')} className="flex items-center p-4 bg-indigo-50 border border-indigo-200 rounded-xl text-left"><div className="bg-white w-12 h-12 flex items-center justify-center rounded-full mr-4"><i className="fa-solid fa-gavel text-xl text-indigo-600"></i></div><div><span className="block font-semibold text-indigo-900">2. Cetak Surat Tindakan</span></div></button>
                        <button onClick={downloadCSV} className="flex items-center p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-left md:col-span-2"><div className="bg-white w-12 h-12 flex items-center justify-center rounded-full mr-4"><i className="fa-solid fa-file-excel text-xl text-emerald-600"></i></div><div><span className="block font-semibold text-emerald-900">Unduh Excel (CSV)</span></div></button>
                      </div>
                    </div>
                  )}
                </div>
              </main>

              {/* AREA CETAK PDF */}
              {selectedStudent && (
                <div className="hidden print:block text-black bg-white w-full">
                  {printLayout === 'rekap' && (
                    <div className="p-4">
                      <div className="text-center border-b-[3px] border-black pb-4 mb-6"><h1 className="text-xl font-bold uppercase">Rekapan Saku Poin</h1><h2 className="text-2xl font-bold uppercase">{masterData.school.namaSekolah}</h2></div>
                      <table className="mb-6 text-sm"><tbody><tr><td className="w-32 font-semibold">Nama Siswa</td><td>: {selectedStudent.nama}</td></tr><tr><td className="font-semibold">Kelas / Absen</td><td>: {selectedStudent.kelas} / {selectedStudent.noAbsen}</td></tr><tr><td className="font-semibold">Total Poin Aktif</td><td className="font-bold">: {totalPoinAktif}</td></tr></tbody></table>
                      <table className="w-full text-sm border-collapse border border-gray-800 mb-8"><thead><tr className="bg-gray-100"><th className="border border-gray-800 p-2">No</th><th className="border border-gray-800 p-2">Tanggal</th><th className="border border-gray-800 p-2">Pelanggaran</th><th className="border border-gray-800 p-2">Poin</th><th className="border border-gray-800 p-2">Status</th></tr></thead><tbody>{studentRecords.length > 0 ? studentRecords.map((r, i) => (<tr key={r.id}><td className="border border-gray-800 p-2 text-center">{i + 1}</td><td className="border border-gray-800 p-2">{new Date(r.tanggal).toLocaleDateString('id-ID')}</td><td className="border border-gray-800 p-2">{r.violation}</td><td className="border border-gray-800 p-2 text-center">{r.status === 'Ditindak' ? '-' : r.poin}</td><td className="border border-gray-800 p-2 text-center text-xs">{r.status}</td></tr>)) : <tr><td colSpan="5" className="border border-gray-800 p-4 text-center">Nihil.</td></tr>}</tbody></table>
                      <div className="flex justify-between mt-12 text-sm pt-8"><div className="text-center w-64"><p className="mb-20">Mengetahui,<br/>Kepala Sekolah</p><p className="font-bold underline">{masterData.school.kepalaSekolah}</p><p>NIP. {masterData.school.nipKepalaSekolah}</p></div><div className="text-center w-64"><p>{masterData.school.lokasi}, {new Date().toLocaleDateString('id-ID')}</p><p className="mb-16">Wali Kelas {selectedStudent.kelas}</p><p className="font-bold underline">{masterData.teachers.find(t => String(t.waliKelas) === String(selectedStudent.kelas))?.nama || '(........................)'}</p></div></div>
                    </div>
                  )}

                  {printLayout === 'tindakan' && (
                    <div className="p-4">
                      <div className="text-center border-b-[3px] border-black pb-4 mb-6"><h1 className="text-lg font-bold uppercase">Surat Tindakan Penanganan</h1><h2 className="text-2xl font-bold uppercase">{masterData.school.namaSekolah}</h2></div>
                      <div className="mb-6"><p className="text-sm">Telah diberikan tindakan kepada siswa:</p><table className="text-sm ml-4 mb-2"><tbody><tr><td className="w-32 font-semibold">Nama</td><td>: {selectedStudent.nama}</td></tr><tr><td className="font-semibold">Kelas</td><td>: {selectedStudent.kelas}</td></tr></tbody></table></div>
                      <table className="w-full text-sm border-collapse border border-gray-800 mb-8"><thead><tr className="bg-gray-200"><th className="border border-gray-800 p-2">No</th><th className="border border-gray-800 p-2">Tanggal</th><th className="border border-gray-800 p-2">Rincian Tindakan</th><th className="border border-gray-800 p-2">Keterangan</th></tr></thead><tbody>{studentActions.length > 0 ? studentActions.map((a, i) => (<tr key={a.id}><td className="border border-gray-800 p-2 text-center">{i + 1}</td><td className="border border-gray-800 p-2">{new Date(a.tanggal).toLocaleDateString('id-ID')}</td><td className="border border-gray-800 p-2">{a.rincian}</td><td className="border border-gray-800 p-2 text-center">{a.keterangan}</td></tr>)) : <tr><td colSpan="4" className="border border-gray-800 p-4 text-center">Nihil.</td></tr>}</tbody></table>
                      <div className="flex justify-between items-start text-center text-sm"><div className="w-1/3 px-2"><p className="mb-20">Kepala Sekolah</p><p className="font-bold underline">{masterData.school.kepalaSekolah}</p></div><div className="w-1/3 px-2"><p className="mb-20">Orang Tua / Wali</p><p className="font-bold underline">{studentActions.length > 0 && studentActions[0].didampingi === 'ya' ? studentActions[0].namaOrtu : '(........................)'}</p></div><div className="w-1/3 px-2"><p className="mb-20">Wali Kelas</p><p className="font-bold underline">{masterData.teachers.find(t => String(t.waliKelas) === String(selectedStudent.kelas))?.nama || '(........................)'}</p></div></div>
                      
                      {studentActions.some(a => a.foto && a.foto.length > 0) && (
                        <div className="mt-12 pt-8" style={{ pageBreakBefore: 'always' }}>
                          <h3 className="text-lg font-bold text-center border-b-2 border-black pb-2 mb-6">Lampiran Dokumentasi</h3>
                          <div className="grid grid-cols-2 gap-8">
                            {studentActions.map(action => action.foto && action.foto.map((base64String, idx) => (
                                <div key={`${action.id}-${idx}`} className="border p-2 text-center"><img src={base64String} className="w-full h-auto max-h-64 object-contain mx-auto mb-2 border"/><p className="text-xs">Tgl: {new Date(action.tanggal).toLocaleDateString('id-ID')}</p></div>
                              )))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* Mobile Menu */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 print:hidden">
                <div className="flex justify-around items-center h-16">
                  <button onClick={() => setActiveTab('input')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'input' ? 'text-blue-600' : 'text-gray-400'}`}><i className="fa-solid fa-floppy-disk text-xl"></i><span className="text-[10px]">Poin</span></button>
                  <button onClick={() => setActiveTab('tindakan')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'tindakan' ? 'text-blue-600' : 'text-gray-400'}`}><i className="fa-solid fa-gavel text-xl"></i><span className="text-[10px]">Tindakan</span></button>
                  <button onClick={() => setActiveTab('rekap')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'rekap' ? 'text-blue-600' : 'text-gray-400'}`}><i className="fa-solid fa-book-open text-xl"></i><span className="text-[10px]">Rekapan</span></button>
                  <button onClick={() => setActiveTab('download')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'download' ? 'text-blue-600' : 'text-gray-400'}`}><i className="fa-solid fa-print text-xl"></i><span className="text-[10px]">Cetak</span></button>
                </div>
              </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
